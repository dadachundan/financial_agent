<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Price Shape Monitor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: #0d1117; color: #e6edf3; min-height: 100vh; }

  header { padding: 16px 24px; border-bottom: 1px solid #21262d;
           display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { font-size: 16px; font-weight: 600; color: #58a6ff; white-space: nowrap; }

  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; flex: 1; }
  .controls input, .controls select {
    background: #161b22; border: 1px solid #30363d; color: #e6edf3;
    padding: 6px 12px; border-radius: 6px; font-size: 14px; outline: none;
  }
  .controls input:focus, .controls select:focus { border-color: #58a6ff; }
  #ticker-input { width: 160px; text-transform: uppercase; }
  .controls label { font-size: 13px; color: #8b949e; white-space: nowrap; }

  #load-btn {
    background: #238636; border: none; color: #fff; padding: 6px 18px;
    border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500;
  }
  #load-btn:hover { background: #2ea043; }
  #load-btn:disabled { background: #21262d; color: #8b949e; cursor: default; }
  #reset-btn {
    background: #21262d; border: 1px solid #30363d; color: #8b949e;
    padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  #reset-btn:hover { border-color: #58a6ff; color: #58a6ff; }

  #status { font-size: 12px; color: #8b949e; white-space: pre-wrap; font-family: monospace;
            max-height: 40vh; overflow-y: auto; background: #161b22; border-radius: 6px;
            padding: 0; line-height: 1.4; }
  #shape-badge {
    font-size: 13px; padding: 3px 10px; border-radius: 12px;
    background: #1f2937; border: 1px solid #374151; display: none;
  }

  #chart-wrap { height: calc(100vh - 130px); padding: 0 8px; }
  #main-chart  { width: 100%; height: 75%; }
  #vol-chart   { width: 100%; height: 25%; }

  #vshape-panel {
    position: fixed; right: 0; top: 60px; width: 260px;
    background: #161b22; border-left: 1px solid #21262d;
    overflow-y: auto; max-height: calc(100vh - 60px);
    padding: 12px; font-size: 13px; display: none;
  }
  #vshape-panel h3 {
    color: #58a6ff; font-size: 13px; margin: 0;
    display: flex; justify-content: space-between; align-items: center;
  }
  #vshape-toggle {
    background: none; border: none; color: #8b949e; cursor: pointer;
    font-size: 15px; padding: 0 2px; line-height: 1;
  }
  #vshape-toggle:hover { color: #e6edf3; }
  #vshape-list { margin-top: 10px; transition: none; }
  .vs-card {
    background: #0d1117; border: 1px solid #21262d; border-radius: 6px;
    padding: 8px 10px; margin-bottom: 8px; cursor: pointer;
  }
  .vs-card:hover { border-color: #58a6ff; }
  .vs-card .vs-type { font-weight: 600; }
  .vs-card.vbottom .vs-type { color: #3fb950; }
  .vs-card.invv    .vs-type { color: #f85149; }
  .vs-card .vs-meta { color: #8b949e; margin-top: 3px; font-size: 12px; }

  .threshold-wrap { display: flex; align-items: center; gap: 8px; }
  #threshold-val { width: 32px; text-align: center; }

  /* ── Watchlist scanner ── */
  #scanner-section {
    border-top: 1px solid #21262d; padding: 12px 16px;
    background: #0d1117;
  }
  #scanner-section h2 { font-size: 13px; font-weight: 600; color: #58a6ff; margin-bottom: 10px; }
  .scan-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
  .day-btn {
    background: #21262d; border: 1px solid #30363d; color: #8b949e;
    padding: 4px 14px; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  .day-btn:hover  { border-color: #58a6ff; color: #58a6ff; }
  .day-btn.active { background: #1f3a5f; border-color: #58a6ff; color: #58a6ff; }
  #scan-status { font-size: 12px; color: #8b949e; }

  #scan-results { display: flex; flex-wrap: wrap; gap: 12px; }
  .sector-group { min-width: 200px; }
  .sector-group h3 { font-size: 11px; color: #8b949e; text-transform: uppercase;
                     letter-spacing: .06em; margin-bottom: 6px; }
  .scan-card {
    display: flex; justify-content: space-between; align-items: center;
    background: #161b22; border: 1px solid #21262d; border-radius: 6px;
    padding: 6px 10px; margin-bottom: 5px; cursor: pointer; font-size: 13px;
  }
  .scan-card:hover { border-color: #58a6ff; }
  .scan-card .sc-ticker { font-weight: 600; color: #e6edf3; }
  .scan-card .sc-type   { font-size: 11px; }
  .scan-card.vbottom .sc-type { color: #3fb950; }
  .scan-card.invv    .sc-type { color: #f85149; }
  .scan-card .sc-pct  { font-size: 12px; margin-left: 8px; }
  .sc-pct.pos { color: #3fb950; }
  .sc-pct.neg { color: #f85149; }
</style>
</head>
<body>

{{ nav | safe }}
<script id="_urlPatch">
(function(){
  var b='{{ _base | default("") }}';
  if(!b) return;
  window._BASE=b;
  var _f=window.fetch;
  window.fetch=function(u,o){
    if(typeof u==='string'&&u.charAt(0)==='/') u=b+u;
    return _f.call(this,u,o);
  };
})();
</script>

<header>
  <h1>Price Shape Monitor</h1>
  <div class="controls">
    <input id="ticker-input" placeholder="e.g. 002371 / 600519 / AAPL" value="NVDA" />

    <select id="days-select">
      <option value="90">3M</option>
      <option value="180">6M</option>
      <option value="365" selected>1Y</option>
      <option value="730">2Y</option>
    </select>

    <div class="threshold-wrap">
      <label>ZigZag&nbsp;%</label>
      <input type="range" id="threshold-range" min="2" max="20" step="0.5" value="5"
             style="width:90px;" oninput="document.getElementById('threshold-val').value=this.value; recomputeZigzag()">
      <input type="number" id="threshold-val" value="5" min="2" max="20" step="0.5"
             oninput="document.getElementById('threshold-range').value=this.value; recomputeZigzag()">
    </div>

    <button id="load-btn" onclick="loadChart()">Load</button>
    <button id="reset-btn" onclick="resetZoom()" title="Reset zoom (or double-click chart)">⊙ Reset</button>
    <pre id="status"></pre>
  </div>
  <span id="shape-badge"></span>
</header>

<div id="chart-wrap">
  <div id="main-chart"></div>
  <div id="vol-chart"></div>
</div>

<div id="vshape-panel">
  <h3>V-shapes detected <button id="vshape-toggle" onclick="toggleVshapePanel()" title="Collapse">‹</button></h3>
  <div id="vshape-list"></div>
</div>

<div id="scanner-section">
  <h2>Watchlist Scanner — stocks at a V-shape pivot</h2>
  <div class="scan-controls">
    <button class="day-btn" onclick="runScan(1)">Last 1 day</button>
    <button class="day-btn" onclick="runScan(2)">Last 2 days</button>
    <button class="day-btn" onclick="runScan(3)">Last 3 days</button>
    <span id="scan-status"></span>
  </div>
  <div id="scan-results"></div>
</div>

<script>
let _ohlcv = null;   // raw price data (cached between threshold changes)
let _data  = null;   // full chart data (ohlcv + zigzag)

// ── keyboard shortcut: Enter ───────────────────────────────────────────────
document.getElementById('ticker-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadChart();
});

// ── auto-load on page open ─────────────────────────────────────────────────
window.addEventListener('load', () => loadChart());

// ── main loader — fetches OHLCV then computes ZigZag ──────────────────────
async function loadChart() {
  const ticker    = document.getElementById('ticker-input').value.trim().toUpperCase();
  const days      = parseInt(document.getElementById('days-select').value);
  const threshold = parseFloat(document.getElementById('threshold-val').value);
  if (!ticker) return;

  const btn = document.getElementById('load-btn');
  btn.disabled = true;

  // Step 1: fetch OHLCV (network, possibly cached on server)
  const needsFetch = !_ohlcv
    || _ohlcv.ticker !== ticker
    || _ohlcv.days   !== days;

  if (needsFetch) {
    setStatus('Fetching price data…');
    try {
      const res = await fetch(`/api/ohlcv?ticker=${encodeURIComponent(ticker)}&days=${days}`);
      const json = await res.json();
      if (json.error) {
        const tb = json.traceback ? '\n\n' + json.traceback : '';
        setStatus('Error: ' + json.error + tb, true);
        btn.disabled = false; return;
      }
      _ohlcv = { ...json, ticker, days };
    } catch(e) {
      setStatus('Network error: ' + e.message, true);
      btn.disabled = false; return;
    }
  }

  // Step 2: compute ZigZag (CPU only, no network)
  setStatus('Computing…');
  try {
    const res = await fetch('/api/zigzag', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ close: _ohlcv.close, dates: _ohlcv.dates, threshold }),
    });
    const zz = await res.json();
    if (zz.error) { setStatus('Error: ' + zz.error, true); btn.disabled = false; return; }

    _data = { ..._ohlcv, ...zz };
    renderChart(_data);
    renderVshapes(_data);
    const src = _ohlcv.from_cache ? ' (cached)' : ` (${_ohlcv.elapsed_ms}ms)`;
    setStatus(`${_ohlcv.ticker} · ${_ohlcv.dates.length} days${src}`);
  } catch(e) {
    setStatus('ZigZag error: ' + e.message, true);
  }
  btn.disabled = false;
}

// ── recompute ZigZag only when threshold changes (no refetch) ─────────────
async function recomputeZigzag() {
  if (!_ohlcv) return;
  const threshold = parseFloat(document.getElementById('threshold-val').value);
  try {
    const res = await fetch('/api/zigzag', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ close: _ohlcv.close, dates: _ohlcv.dates, threshold }),
    });
    const zz = await res.json();
    if (zz.error) return;
    _data = { ..._ohlcv, ...zz };
    renderChart(_data);
    renderVshapes(_data);
  } catch(_) {}
}

function setStatus(msg, err=false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = err ? '#f85149' : '#8b949e';
}

// ── chart rendering ──────────────────────────────────────────────────────────
function renderChart(d) {
  const badge = document.getElementById('shape-badge');
  badge.textContent = d.shape_label;
  badge.style.display = 'inline';

  // Candlestick
  const candles = {
    type: 'candlestick',
    x: d.dates, open: d.open, high: d.high, low: d.low, close: d.close,
    name: d.ticker,
    increasing: { line: { color: '#ef5350' }, fillcolor: '#ef5350' },  // Chinese convention: red=up
    decreasing: { line: { color: '#26a69a' }, fillcolor: '#26a69a' },
    xaxis: 'x', yaxis: 'y',
  };

  // ZigZag line
  const zzX = d.pivots.map(p => p.date);
  const zzY = d.pivots.map(p => p.price);
  const zigzag = {
    type: 'scatter', mode: 'lines',
    x: zzX, y: zzY,
    line: { color: '#f0a500', width: 2 },
    name: 'ZigZag',
    xaxis: 'x', yaxis: 'y',
  };

  // Peaks + troughs
  const peaks   = d.pivots.filter(p => p.direction === +1);
  const troughs = d.pivots.filter(p => p.direction === -1);

  const peakMarkers = {
    type: 'scatter', mode: 'markers',
    x: peaks.map(p => p.date), y: peaks.map(p => p.price),
    marker: { color: '#f85149', size: 8, symbol: 'triangle-down' },
    name: 'Peak', xaxis: 'x', yaxis: 'y',
  };
  const troughMarkers = {
    type: 'scatter', mode: 'markers',
    x: troughs.map(p => p.date), y: troughs.map(p => p.price),
    marker: { color: '#3fb950', size: 8, symbol: 'triangle-up' },
    name: 'Trough', xaxis: 'x', yaxis: 'y',
  };

  // V-shape shaded regions
  const vShapes = buildVshapeShapes(d);

  const layout = {
    paper_bgcolor: '#0d1117', plot_bgcolor: '#0d1117',
    font: { color: '#8b949e', size: 12 },
    margin: { t: 10, b: 0, l: 60, r: 10 },
    xaxis: {
      type: 'category',
      rangeslider: { visible: false },
      showgrid: true, gridcolor: '#21262d',
      tickfont: { size: 11 },
    },
    yaxis: {
      showgrid: true, gridcolor: '#21262d',
      tickfont: { size: 11 }, side: 'right',
    },
    legend: {
      orientation: 'h', x: 0, y: 1.02, bgcolor: 'rgba(0,0,0,0)',
      font: { size: 11 },
    },
    shapes: vShapes,
    hovermode: 'x unified',
  };

  Plotly.react('main-chart', [candles, zigzag, peakMarkers, troughMarkers], layout,
    { displayModeBar: false, responsive: true });

  // Volume chart
  const colors = d.close.map((c, i) => c >= d.open[i] ? '#ef535099' : '#26a69a99');
  const volTrace = {
    type: 'bar', x: d.dates, y: d.volume, marker: { color: colors },
    name: 'Volume', xaxis: 'x', yaxis: 'y',
  };
  const volLayout = {
    paper_bgcolor: '#0d1117', plot_bgcolor: '#0d1117',
    font: { color: '#8b949e', size: 11 },
    margin: { t: 4, b: 40, l: 60, r: 10 },
    xaxis: { type: 'category', showgrid: false, tickangle: -30, tickfont: { size: 10 } },
    yaxis: { showgrid: true, gridcolor: '#21262d', side: 'right', tickfont: { size: 10 } },
    showlegend: false,
  };
  Plotly.react('vol-chart', [volTrace], volLayout,
    { displayModeBar: false, responsive: true });

  // sync x-axis zoom between both charts
  document.getElementById('main-chart').on('plotly_relayout', ev => {
    if (ev['xaxis.range[0]'] !== undefined) {
      Plotly.relayout('vol-chart', {
        'xaxis.range[0]': ev['xaxis.range[0]'],
        'xaxis.range[1]': ev['xaxis.range[1]'],
      });
    }
  });
}

// Build semi-transparent rect shapes for each V-bottom / inv-V
function buildVshapeShapes(d) {
  return d.vshapes.map(vs => ({
    type: 'rect',
    xref: 'x', yref: 'paper',
    x0: d.dates[vs.idx_left],
    x1: d.dates[vs.idx_right],
    y0: 0, y1: 1,
    fillcolor: vs.type === 'V-bottom' ? 'rgba(63,185,80,0.07)' : 'rgba(248,81,73,0.07)',
    line: { width: 0 },
    layer: 'below',
  }));
}

// ── V-shape side panel ───────────────────────────────────────────────────────
function toggleVshapePanel() {
  const list = document.getElementById('vshape-list');
  const btn  = document.getElementById('vshape-toggle');
  const collapsed = list.style.display === 'none';
  list.style.display = collapsed ? 'block' : 'none';
  btn.textContent = collapsed ? '‹' : '›';
  btn.title       = collapsed ? 'Collapse' : 'Expand';
  document.getElementById('chart-wrap').style.marginRight = collapsed ? '268px' : '14px';
}

function renderVshapes(d) {
  const panel = document.getElementById('vshape-panel');
  const list  = document.getElementById('vshape-list');

  if (!d.vshapes.length) { panel.style.display = 'none'; document.getElementById('chart-wrap').style.marginRight = '0'; return; }

  panel.classList.remove('collapsed');
  document.getElementById('vshape-toggle').textContent = '‹';
  panel.style.display = 'block';
  document.getElementById('chart-wrap').style.marginRight = '268px';

  list.innerHTML = d.vshapes.map((vs, i) => {
    const cls   = vs.type === 'V-bottom' ? 'vbottom' : 'invv';
    const emoji = vs.type === 'V-bottom' ? '▼→▲' : '▲→▼';
    const dateL = d.dates[vs.idx_left];
    const dateR = d.dates[vs.idx_right];
    const midPx = d.close[vs.idx_mid].toFixed(2);
    return `
      <div class="vs-card ${cls}" onclick="zoomTo(${vs.idx_left}, ${vs.idx_right})">
        <div class="vs-type">${emoji} ${vs.type}  −${vs.depth_pct}%</div>
        <div class="vs-meta">${dateL} → ${dateR}</div>
        <div class="vs-meta">pivot @ ${midPx}</div>
      </div>`;
  }).join('');
}

// ── Watchlist scanner ─────────────────────────────────────────────────────────
let _activeScanDays = null;

async function runScan(nDays) {
  _activeScanDays = nDays;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const threshold = parseFloat(document.getElementById('threshold-val').value);
  const statusEl  = document.getElementById('scan-status');
  const resultsEl = document.getElementById('scan-results');
  statusEl.textContent = 'Scanning watchlist…';
  resultsEl.innerHTML  = '';

  try {
    const res  = await fetch(`/api/watchlist-scan?days=${nDays}&threshold=${threshold}`);
    const data = await res.json();
    if (data.error) { statusEl.textContent = 'Error: ' + data.error; return; }

    const { results, total } = data;
    statusEl.textContent = `${results.length} of ${total} stocks hit a pivot in the last ${nDays} trading day${nDays > 1 ? 's' : ''}`;

    if (!results.length) {
      resultsEl.innerHTML = '<span style="color:#8b949e;font-size:13px">No matches</span>';
      return;
    }

    // Group by sector
    const bySector = {};
    results.forEach(r => {
      const s = r.sector || 'OTHER';
      (bySector[s] = bySector[s] || []).push(r);
    });

    resultsEl.innerHTML = Object.entries(bySector).map(([sector, items]) => `
      <div class="sector-group">
        <h3>${sector}</h3>
        ${items.map(r => {
          const cls    = r.direction === -1 ? 'vbottom' : 'invv';
          const pctCls = r.pct_since >= 0 ? 'pos' : 'neg';
          const pctStr = r.pct_since !== 0 ? `${r.pct_since > 0 ? '+' : ''}${r.pct_since}%` : '';
          return `<div class="scan-card ${cls}" onclick="loadTicker('${r.ticker}')">
            <div>
              <span class="sc-ticker">${r.ticker}</span>
              <span class="sc-type">&nbsp;${r.type}</span>
            </div>
            <div style="text-align:right">
              <span style="font-size:12px;color:#8b949e">${r.price}</span>
              ${pctStr ? `<span class="sc-pct ${pctCls}">&nbsp;${pctStr}</span>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>`).join('');

  } catch(e) {
    statusEl.textContent = 'Error: ' + e.message;
  }
}

function loadTicker(ticker) {
  document.getElementById('ticker-input').value = ticker;
  // scroll to top so user sees the chart load
  window.scrollTo({ top: 0, behavior: 'smooth' });
  loadChart();
}

function resetZoom() {
  Plotly.relayout('main-chart', { 'xaxis.autorange': true, 'yaxis.autorange': true });
  Plotly.relayout('vol-chart',  { 'xaxis.autorange': true, 'yaxis.autorange': true });
}

function zoomTo(idxL, idxR) {
  if (!_data) return;
  // add a small buffer
  const buf = Math.max(3, Math.round((idxR - idxL) * 0.15));
  const x0  = _data.dates[Math.max(0, idxL - buf)];
  const x1  = _data.dates[Math.min(_data.dates.length - 1, idxR + buf)];
  Plotly.relayout('main-chart', { 'xaxis.range': [x0, x1] });
  Plotly.relayout('vol-chart',  { 'xaxis.range': [x0, x1] });
}
</script>
</body>
</html>
